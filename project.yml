name: Reflex
options:
  bundleIdPrefix: com.reflex
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    GENERATE_INFOPLIST_FILE: false
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Reflex:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Reflex
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reflex.app
        PRODUCT_NAME: Reflex
        INFOPLIST_FILE: Reflex/Info.plist
        CODE_SIGN_ENTITLEMENTS: Reflex/Reflex.entitlements
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    info:
      path: Reflex/Info.plist
    entitlements:
      path: Reflex/Reflex.entitlements
